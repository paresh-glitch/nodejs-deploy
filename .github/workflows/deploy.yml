name: deploy nodejs

on:
  push:
    branches:
      - master
        
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: deploy via ssh
        uses: appleboy/ssh-actions@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: aez@aez-VMware-Virtual-Platform
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/aez/Desktop/node-app-deploy
            git pull
            docker-compose up -d --build